<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <title>SETL Live EFB</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>SETL <span id="wsStatus" style="display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:500;letter-spacing:0.04em;vertical-align:middle;margin-left:6px;"><span id="wsDot" style="width:8px;height:8px;border-radius:50%;background:#ff9c00;display:inline-block;"></span><span id="wsLabel" style="color:#99a8c6;">Connecting…</span><button id="connectBtn" class="btn-inline-connect" style="font-size:0.62rem;font-weight:600;padding:2px 10px;min-height:unset;width:auto;border-radius:4px;border:1px solid #3a4f7a;background:transparent;color:#7ba7e0;letter-spacing:0.05em;line-height:1.6;cursor:pointer;">Connect</button></span></h1>
        <p class="sub">Smart Emergency Terrain Landing — real-time EFB with live fusion and terrain risk grid.</p>

        <div class="card">
          <label>Session ID</label>
          <input id="sessionId" value="setl-live-1" />
        </div>

        <div class="card">
          <h2>Controls</h2>
          <div class="field">
            <label for="locationSearch">Location search</label>
            <div class="buttons stretch">
              <input id="locationSearch" placeholder="Delhi, Jaipur Airport, Mumbai..." />
              <button id="locationBtn">Search</button>
            </div>
          </div>
          <div class="field">
            <label for="trafficSearch">Aircraft search</label>
            <div class="buttons stretch">
              <input id="trafficSearch" placeholder="Search callsign or ICAO24" />
              <button id="trafficSearchBtn">Find</button>
            </div>
          </div>
          <div class="buttons">
            <button id="clearTrackBtn" class="ghost">Area Mode</button>
          </div>
          <div id="appNotice" class="mini">Ready.</div>
        </div>

        <div class="card">
          <h2>Decision</h2>
          <div id="decisionBox" class="mini"></div>
        </div>

        <div class="card">
          <h2>Ops view</h2>
          <div id="opsInfo" class="mini"></div>
        </div>

        <div class="card stats">
          <div><span>Source</span><strong id="source">--</strong></div>
          <div><span>Status</span><strong id="status">--</strong></div>
          <div><span>Altitude</span><strong id="altitude">--</strong></div>
          <div><span>Speed</span><strong id="speed">--</strong></div>
          <div><span>Heading</span><strong id="heading">--</strong></div>
          <div><span>Risk</span><strong id="riskLevel">--</strong></div>
        </div>

        <div class="card">
          <div class="trafficHead">
            <h2>Aircraft feed</h2>
            <div id="trafficSummary" class="mini">Waiting for traffic...</div>
          </div>
          <div id="trafficList" class="lz-list"></div>
        </div>

        <div class="card">
          <h2>Layers</h2>
          <div id="layers" class="lz-list"></div>
        </div>

        <div class="card">
          <h2>Top zones</h2>
          <div id="zones" class="lz-list"></div>
        </div>
      </aside>

      <main class="mapShell">
        <div class="legendWrap">
          <div class="legendBar"></div>
          <div class="legendLabels">
            <span>Safer</span>
            <span>Riskier</span>
          </div>
        </div>
        <div id="map"></div>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/js/main.js"></script>
  </body>
</html>
