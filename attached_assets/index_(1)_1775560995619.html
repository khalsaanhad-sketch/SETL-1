<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0b1220" />
    <link rel="manifest" href="/manifest.json" />
    <title>SETL Complete Road Layer EFB</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>SETL Complete</h1>
        <p class="sub">
          Hybrid Replit + GitHub-ready EFB with live fusion, airport logic, and
          road decision layer.
        </p>

        <div class="card">
          <label>Session ID</label>
          <input id="sessionId" value="demo-classroom-1" />
          <div class="buttons">
            <button id="connectBtn">Connect</button>
            <button id="demoBtn">Start Demo</button>
          </div>
        </div>

        <div class="card">
          <h2>Controls</h2>

          <div class="field">
            <label for="locationSearch">Location search</label>
            <div class="buttons stretch">
              <input
                id="locationSearch"
                placeholder="Delhi, Jaipur Airport, Mumbai..."
              />
              <button id="locationBtn">Search</button>
            </div>
          </div>

          <div class="field">
            <label for="trafficSearch">Aircraft search</label>
            <div class="buttons stretch">
              <input
                id="trafficSearch"
                placeholder="Search callsign or ICAO24"
              />
              <button id="trafficSearchBtn">Find</button>
            </div>
          </div>

          <div class="buttons">
            <button id="clearTrackBtn" class="ghost">Area Mode</button>
          </div>

          <div id="appNotice" class="mini">Ready.</div>
        </div>

        <div class="card">
          <h2>Decision</h2>
          <div id="decisionBox" class="mini"></div>
        </div>

        <div class="card stats">
          <div><span>Source</span><strong id="source">--</strong></div>
          <div><span>Status</span><strong id="status">--</strong></div>
          <div><span>Altitude</span><strong id="altitude">--</strong></div>
          <div><span>Speed</span><strong id="speed">--</strong></div>
          <div><span>Heading</span><strong id="heading">--</strong></div>
        </div>

        <div class="card">
          <div class="trafficHead">
            <h2>Aircraft feed</h2>
            <div id="trafficSummary" class="mini">Waiting for traffic...</div>
          </div>
          <div id="trafficList" class="lz-list"></div>
        </div>

        <div class="card">
          <h2>Layers</h2>
          <div id="layers" class="lz-list"></div>
        </div>

        <div class="card">
          <h2>Top zones</h2>
          <div id="zones" class="lz-list"></div>
        </div>

        <div class="card">
          <h2>Ops view</h2>
          <div id="opsInfo" class="mini"></div>
        </div>
      </aside>

      <main class="mapShell">
        <div class="legendWrap">
          <div class="legendBar"></div>
          <div class="legendLabels">
            <span>Safer</span>
            <span>Riskier</span>
          </div>
        </div>
        <div id="map"></div>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      crossorigin=""
    ></script>
    <script src="/static/main.js"></script>
  </body>
</html>
